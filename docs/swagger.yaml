  /appeals:
    get:
      description: Возвращает все обращения, созданные текущим авторизованным пользователем
      produces:
      - application/json
      responses:
        "200":
          description: Успешный ответ со списком обращений
          schema:
            $ref: '#/definitions/github_com_go-park-mail-ru_2026_1_Clac_Clac_facade_internal_delivery_http_dto.GetAppealsResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить список обращений
      tags:
      - Appeals
    post:
      consumes:
      - application/json
      description: Создает новое обращение (тикет) от лица авторизованного пользователя
      parameters:
      - description: Данные обращения
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_go-park-mail-ru_2026_1_Clac_Clac_facade_internal_delivery_http_dto.CreateAppealRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Appeal link UUID
          schema:
            properties:
              appeal_link:
                type: string
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
