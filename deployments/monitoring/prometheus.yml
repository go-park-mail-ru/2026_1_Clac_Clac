global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'facade_service'
    static_configs:
      - targets: ['nexus-facade:9091']

  - job_name: 'user_service'
    static_configs:
      - targets: ['nexus-user:9091']

  - job_name: 'board_service'
    static_configs:
      - targets: ['nexus-board:9091']

  - job_name: 'appeal_service'
    static_configs:
      - targets: ['nexus-appeal:9091']

  - job_name: 'authorization_service'
    static_configs:
     - targets: ['nexus-authorization:9091']

  - job_name: 'mail_sender_service'
    static_configs:
      - targets: ['nexus-mail-sender:9091']

  - job_name: 'rate-limiter_service'
    static_configs:
      - targets: ['nexus-rate-limiter:9091']
