services:
  realtime:
    build:
      context: ../../
      dockerfile: deployments/realtime/Dockerfile
    image: nexus-realtime
    container_name: nexus-realtime
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - REDIS_HOST=realtime-redis
      - REDIS_PORT=6379
    volumes:
      - ../../realtime/config.yaml:/app/config.yaml:ro
    env_file:
      - ../../realtime/.env
    restart: unless-stopped
    depends_on:
      realtime-redis:
        condition: service_healthy
    networks:
      - nexus-network

  realtime-redis:
    image: redis:7-alpine
    container_name: nexus-realtime-redis
    volumes:
      - realtime_redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    env_file:
      - ../../realtime/.env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD}",
          "ping",
          "--no-auth-warning",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nexus-network

volumes:
  realtime_redis_data:

networks:
  nexus-network:
    external: true
