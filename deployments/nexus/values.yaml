namespace: "nexus-prod"

ingress:
  enabled: true
  host: clac-clac.ru

frontend:
  enabled: true
  image: nginx:alpine
  port: 80
  static: /home/ubuntu/public
  resources:
    limits:
      memory: "64Mi"
      cpu: "10m"

postgres:
  image: postgres:17-alpine
  port: 5432
  resources:
    limits: { memory: "256Mi", cpu: "50m" }

redis:
  image: redis:7-alpine
  port: 6379
  resources:
    limits: { memory: "256Mi", cpu: "50m" }

services:
  facade:
    enabled: true
    hasConfig: true
    hasSecrets: true
    image: nisakoo/nexus-facade:latest
    port: 8080
    database:
      enabled: false
    redis:
      enabled: false
    resources:
      limits:
        memory: "256Mi"
        cpu: "50m"

  rate-limiter:
    enabled: true
    hasConfig: true
    hasSecrets: true
    image: nisakoo/nexus-rate_limiter:latest
    port: 8080
    database:
      enabled: false
    redis:
      enabled: true
    resources:
      limits:
        memory: "256Mi"
        cpu: "50m"

  authorization:
    enabled: true
    hasConfig: true
    hasSecrets: true
    image: nisakoo/nexus-authorization:latest
    port: 8080
    database:
      enabled: false
    redis:
      enabled: true
    resources:
      limits:
        memory: "256Mi"
        cpu: "50m"

  user:
    enabled: true
    hasConfig: true
    hasSecrets: true
    image: nisakoo/nexus-user:latest
    port: 8080
    database:
      enabled: true
    redis:
      enabled: false
    resources:
      limits:
        memory: "256Mi"
        cpu: "50m"

  mail-sender:
    enabled: true
    hasConfig: true
    hasSecrets: true
    image: nisakoo/nexus-mail_sender:latest
    port: 8080
    database:
      enabled: false
    redis:
      enabled: true
    resources:
      limits:
        memory: "128Mi"
        cpu: "10m"

  board:
    enabled: true
    hasConfig: true
    hasSecrets: true
    image: nisakoo/nexus-board:latest
    port: 8080
    database:
      enabled: true
    redis:
      enabled: true
    resources:
      limits:
        memory: "128Mi"
        cpu: "50m"

  appeal:
    enabled: true
    hasConfig: true
    hasSecrets: true
    image: nisakoo/nexus-appeal:latest
    port: 8080
    database:
      enabled: true
    redis:
      enabled: false
    resources:
      limits:
        memory: "128Mi"
        cpu: "50m"
