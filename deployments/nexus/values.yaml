namespace: "nexus-prod"

ingress:
  enabled: true
  host: clac-clac.ru

frontend:
  enabled: true
  image: nginx:alpine
  port: 80
  static: /home/ubuntu
  resources:
    limits:
      memory: "64Mi"
      cpu: "10m"

postgres:
  image: postgres:17-alpine
  port: 5432
  resources:
    limits: { memory: "128Mi", cpu: "50m" }
    requests: { memory: "64Mi", cpu: "10m" }

redis:
  image: redis:7-alpine
  port: 6379
  resources:
    limits: { memory: "64Mi", cpu: "50m" }
    requests: { memory: "32Mi", cpu: "10m" }

