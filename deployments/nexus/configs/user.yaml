app:
  log_level: info

engine:
  addr: 0.0.0.0:8080
  graceful_shutdown_timeout: 15

s3_avatars:
  valid_extensions:
    image/png:
    image/jpg:
    image/jpeg:
    image/webp:

database:
  min_connections: 2
  max_connections: 10
  max_connection_lifetime: 1h
  max_health_check_period: 30s
  ping_sleep_time: 2s
  time_out: 5s
  max_retries: 5

sentry:
  environment: "production"
  release: "RK3"
  service_name: "user"
  traces_sample_rate: 1.0
  tags:
    layer: "edge"
    team: "api-platform"
    protocol: "http_rest"
  repanic: true

metrics:
  metrics_port: ":9091"
