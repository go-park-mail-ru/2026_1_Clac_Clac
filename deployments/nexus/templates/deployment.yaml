{{- range $svcName, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Chart.Name }}-{{ $svcName }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $svcName }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $svcName }}
  template:
    metadata:
      labels:
        app: {{ $svcName }}
    spec:
      containers:
        - name: {{ $svcName }}
          image: {{ $svc.image }}
          ports:
            - containerPort: {{ $svc.port }}
              name: http

          {{- with $svc.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- if and $svc.hasSecrets $svc.redis.enabled }}
          env:
            - name: REDIS_HOST
              value: {{ $svcName }}-redis
            - name: REDIS_PORT
              value: {{ $.Values.redis.port | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $svcName }}-secret
                  key: REDIS_PASSWORD
          {{- end }}

          {{- if $svc.hasConfig }}
          volumeMounts:
            - name: config-volume
              mountPath: /app/config.yaml
              subPath: config.yaml
          {{- end }}

      {{- if $svc.hasConfig }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ $svcName }}-config
      {{- end }}
{{- end }}
{{- end }}
