{{- range $svcName, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Chart.Name }}-{{ $svcName }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $svcName }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $svcName }}
  template:
    metadata:
      labels:
        app: {{ $svcName }}
    spec:
      containers:
        - name: {{ $svcName }}
          image: {{ $svc.image }}
          ports:
            - containerPort: {{ $svc.port }}
              name: http

          {{- with $svc.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- if $svc.hasConfig }}
          volumeMounts:
            - name: config-volume
              mountPath: /app/config.yaml
              subPath: config.yaml
          {{- end }}

      {{- if $svc.hasConfig }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ $svcName }}-config
      {{- end }}
{{- end }}
{{- end }}
