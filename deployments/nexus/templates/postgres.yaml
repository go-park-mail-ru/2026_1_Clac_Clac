{{- range $svcName, $svc := .Values.services }}
{{- if and $svc.enabled $svc.database.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Chart.Name }}-{{ $svcName }}-db
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $svcName }}-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $svcName }}-db
  template:
    metadata:
      labels:
        app: {{ $svcName }}-db
    spec:
      containers:
        - name: {{ $svcName }}
          image: {{ $.Values.postgres.image }}
          ports:
            - containerPort: {{ $.Values.postgres.port }}
              name: postgres
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ $.Chart.Name }}-{{ $svcName }}-db-pvc
      {{- with $.Values.postgres.resources }}
      resources:
        {{- toYaml . | nindent 12 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Chart.Name }}-{{ $svcName }}-db-service
  namespace: {{ $.Values.namespace }}
spec:
  selector:
    app: {{ $svcName }}-db
  ports:
    - port: {{ $.Values.postgres.port }}
      targetPort: postgres
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $.Chart.Name }}-{{ $svcName }}-db-pvc
  namespace: {{ $.Values.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard
{{- end }}
{{- end }}
