{{- range $svcName, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Chart.Name }}-{{ $svcName }}-service
  namespace: {{ $.Values.namespace }}
  annotations:
    prometheus.io/scrape: "true"
spec:
  selector:
    app: {{ $svcName }}
  ports:
    - port: {{ $svc.port }}
      targetPort: http
      name: http
    - port: 9091
      targetPort: metrics
      name: metrics
  type: ClusterIP
{{- end }}
{{- end }}
