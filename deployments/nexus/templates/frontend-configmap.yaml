apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-frontend-nginx
  namespace: {{ .Values.namespace }}
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;

        if ($host = "clac-clac.mooo.com") {
            return 301 https://clac-clac.ru$request_uri;
        }

        gzip on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_min_length 256;
        gzip_types
            application/javascript
            application/json
            application/xml
            text/css
            text/javascript
            text/plain
            text/xml
            image/svg+xml;

        # Yandex, Google, Cloudflare
        resolver 77.88.8.8 8.8.8.8 1.1.1.1 valid=300s;
        resolver_timeout 5s;

        set $s3_bucket "https://nexus-frontend.hb.ru-msk.vkcloud-storage.ru";

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot|mp4|webm|mp3|wav|ogg)$ {
            proxy_pass $s3_bucket$uri;

            add_header Cache-Control "public, max-age=31536000, immutable" always;

            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'sha256-hB0j7QlEePD9ggRRDWPcGYJWVzEYeDo+6Kq5M4QZLMA='; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://nexus-avatars-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-boards-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-cards-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-support-prod.hb.ru-msk.vkcloud-storage.ru; connect-src 'self' https://esm.sh https://fonts.googleapis.com https://fonts.gstatic.com https://nexus-avatars-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-boards-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-cards-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-support-prod.hb.ru-msk.vkcloud-storage.ru;" always;
            add_header X-Content-Type-Options 'nosniff' always;
            add_header X-Frame-Options 'SAMEORIGIN' always;
            add_header Referrer-Policy 'no-referrer-when-downgrade' always;
        }

        location = /index.html {
            proxy_pass $s3_bucket/index.html;

            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'sha256-hB0j7QlEePD9ggRRDWPcGYJWVzEYeDo+6Kq5M4QZLMA='; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://nexus-avatars-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-boards-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-cards-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-support-prod.hb.ru-msk.vkcloud-storage.ru; connect-src 'self' https://esm.sh https://fonts.googleapis.com https://fonts.gstatic.com https://nexus-avatars-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-boards-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-cards-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-support-prod.hb.ru-msk.vkcloud-storage.ru;" always;
            add_header X-Content-Type-Options 'nosniff' always;
            add_header X-Frame-Options 'SAMEORIGIN' always;
            add_header Referrer-Policy 'no-referrer-when-downgrade' always;
        }

        location / {
            proxy_pass $s3_bucket$uri;
            proxy_intercept_errors on;
            error_page 403 404 =200 /index.html;

            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;

            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'sha256-hB0j7QlEePD9ggRRDWPcGYJWVzEYeDo+6Kq5M4QZLMA='; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://nexus-avatars-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-boards-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-cards-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-support-prod.hb.ru-msk.vkcloud-storage.ru; connect-src 'self' https://esm.sh https://fonts.googleapis.com https://fonts.gstatic.com https://nexus-avatars-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-boards-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-cards-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-support-prod.hb.ru-msk.vkcloud-storage.ru;" always;
            add_header X-Content-Type-Options 'nosniff' always;
            add_header X-Frame-Options 'SAMEORIGIN' always;
            add_header Referrer-Policy 'no-referrer-when-downgrade' always;
        }
    }
