services:
  board:
    build:
      context: ../../
      dockerfile: deployments/board/Dockerfile
    image: nexus-board
    container_name: nexus-board
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ../../board/config.yaml:/app/config.yaml:ro
    env_file:
      - ../../board/.env
    environment:
      - DATABASE_HOST=board-db
      - DATABASE_PORT=5432
      - REDIS_HOST=board-redis
      - REDIS_PORT=6379
    restart: unless-stopped
    depends_on:
      board-migrate:
        condition: service_completed_successfully
      board-redis:
        condition: service_healthy

  board-db:
    image: postgres:17-alpine
    container_name: nexus-board-db
    volumes:
      - board_db_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    ports:
      - "127.0.0.1:${DATABASE_PORT}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  board-migrate:
    image: migrate/migrate
    volumes:
      - ../../board/db/migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@board-db:5432/${DATABASE_NAME}?sslmode=disable
      - up
    depends_on:
      board-db:
        condition: service_healthy

  board-redis:
    image: redis:7-alpine
    container_name: nexus-board-redis
    volumes:
      - board_redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  board_db_data:
  board_redis_data:
