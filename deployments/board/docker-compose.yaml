services:
  board:
    build:
      context: ../../
      dockerfile: deployments/board/Dockerfile
    image: nexus-board
    container_name: nexus-board
    ports:
      - "127.0.0.1:50052:8080"
    volumes:
      - ../../board/config.yaml:/app/config.yaml:ro
    env_file:
      - ../../board/.env
    environment:
      - DATABASE_USER=${DATABASE_SERVICE_USER}
      - DATABASE_PASSWORD=${DATABASE_SERVICE_PASSWORD}
      - DATABASE_HOST=board-db
      - DATABASE_PORT=5432
      - REDIS_HOST=board-redis
      - REDIS_PORT=6379
    restart: unless-stopped
    depends_on:
      board-db-init:
        condition: service_completed_successfully
      board-redis:
        condition: service_healthy
    networks:
      - default
      - nexus-network

  board-db:
    image: postgres:17-alpine
    container_name: nexus-board-db
    volumes:
      - board_db_data:/var/lib/postgresql/data/
      - ../../deployments/nexus/configs/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  board-migrate:
    image: migrate/migrate
    volumes:
      - ../../board/db/migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@board-db:5432/${DATABASE_NAME}?sslmode=disable
      - up
    depends_on:
      board-db:
        condition: service_healthy

  board-db-init:
    image: postgres:17-alpine
    container_name: nexus-board-db-init
    volumes:
      - ../../deployments/nexus/scripts/init_service_users.sql:/init_service_users.sql:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        PGPASSWORD=$${DATABASE_PASSWORD} psql \
          -h board-db \
          -U $${DATABASE_USER} \
          -d $${DATABASE_NAME} \
          -v service_user="'board_service'" \
          -v service_password="'$${DATABASE_SERVICE_PASSWORD}'" \
          -v admin_user="'$${DATABASE_USER}'" \
          -f /init_service_users.sql
    env_file:
      - ../../board/.env
    depends_on:
      board-migrate:
        condition: service_completed_successfully
    networks:
      - default

  board-redis:
    image: redis:7-alpine
    container_name: nexus-board-redis
    volumes:
      - board_redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping", "--no-auth-warning"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  board_db_data:
  board_redis_data:

networks:
  nexus-network:
    external: true
