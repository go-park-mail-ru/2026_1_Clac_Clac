services:
  appeal:
    build:
      context: ../../
      dockerfile: deployments/appeal/Dockerfile
    image: nexus-appeal
    container_name: nexus-appeal
    ports:
      - "127.0.0.1:50056:8080"
    volumes:
      - ../../appeal/config.yaml:/app/config.yaml:ro
    env_file:
      - ../../appeal/.env
    environment:
      - DATABASE_USER=${DATABASE_SERVICE_USER}
      - DATABASE_PASSWORD=${DATABASE_SERVICE_PASSWORD}
      - DATABASE_HOST=appeal-db
      - DATABASE_PORT=5432
    restart: unless-stopped
    depends_on:
      appeal-db-init:
        condition: service_completed_successfully
    networks:
      - default
      - nexus-network

  appeal-db:
    image: postgres:17-alpine
    container_name: nexus-appeal-db
    volumes:
      - appeal_db_data:/var/lib/postgresql/data/
      - ../../deployments/nexus/configs/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  appeal-migrate:
    image: migrate/migrate
    volumes:
      - ../../appeal/db/migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@appeal-db:5432/${DATABASE_NAME}?sslmode=disable
      - up
    depends_on:
      appeal-db:
        condition: service_healthy

  appeal-db-init:
    image: postgres:17-alpine
    container_name: nexus-appeal-db-init
    volumes:
      - ../../deployments/nexus/scripts/init_service_users.sql:/init_service_users.sql:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        PGPASSWORD=$${DATABASE_PASSWORD} psql \
          -h appeal-db \
          -U $${DATABASE_USER} \
          -d $${DATABASE_NAME} \
          -v service_user="'appeal_service'" \
          -v service_password="'$${DATABASE_SERVICE_PASSWORD}'" \
          -v admin_user="'$${DATABASE_USER}'" \
          -f /init_service_users.sql
    env_file:
      - ../../appeal/.env
    depends_on:
      appeal-migrate:
        condition: service_completed_successfully
    networks:
      - default

volumes:
  appeal_db_data:

networks:
  nexus-network:
    external: true
