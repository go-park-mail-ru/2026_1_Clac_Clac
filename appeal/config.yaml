app:
  log_level: info

engine:
  addr: 0.0.0.0:8080
  write_timeout: 15
  read_timeout: 15
  idle_timeout: 60
  graceful_shutdown_timeout: 15

database:
  min_connections: 2
  max_connections: 10
  max_connection_lifetime: 1h
  max_health_check_period: 30s
  ping_sleep_time: 2s
  time_out: 5s
  max_retries: 5

sentry:
  environment: "production"
  release: "RK3"
  service_name: "appeal"
  traces_sample_rate: 1.0
  tags:
    layer: "grpc"
    team: "api-platform"
    protocol: "grpc"
  repanic: false
