app:
  log_level: info

engine:
  addr: 0.0.0.0:8080
  write_timeout: 15
  read_timeout: 15
  idle_timeout: 60
  graceful_shutdown_timeout: 15

cors:
  credentials: "true"
  methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
  headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-CSRF-Token"
  max_age: 864000

redis:
  number_db: 0
  min_connections: 20
  max_connections: 100
  ping_sleep_time: 2s
  max_retries: 5

database_rate_limiters:
  database_actions:
    login:
      limit: 5
      action: "login"
      window: 1m
    register:
      limit: 5
      action: "register"
      window: 1h

monolith_url: http://127.0.0.1:8081

mail_sender_url: "127.0.0.1:50051"
