syntax = "proto3";

package mail;

option go_package = "./pkg/contracts/mail_sender;mail_sender";

// Сервис для отправки email-сообщений пользователям
service MailSenderService {
    // Генерация и отправка 6-значного кода на почту
    rpc SendRecoveryCode(SendRecoveryCodeRequest) returns (SendRecoveryCodeResponse);

    // Проверка 6-значного кода и выдача безопасного токена (Reset Token)
    rpc CheckRecoveryCode(CheckRecoveryCodeRequest) returns (CheckRecoveryCodeResponse);

    // Обмен токена на UserLink перед сменой пароля
    rpc ExchangeTokenForUser(ExchangeTokenRequest) returns (ExchangeTokenResponse);
}

message SendRecoveryCodeRequest {
    string email = 1;
    string user_link = 2;
}

message SendRecoveryCodeResponse {}

message CheckRecoveryCodeRequest {
    string code = 1;
}

message CheckRecoveryCodeResponse {}


message ExchangeTokenRequest {
    string reset_token = 1; // Токен, который фронт прислал вместе с новым паролем
}

message ExchangeTokenResponse {
    string user_link = 1; // Возвращаем UUID юзера, чтобы Фасад мог передать его в сервис User для смены пароля
}
