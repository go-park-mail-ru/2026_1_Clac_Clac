syntax = "proto3";

package proto.appeal.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/go-park-mail-ru/2026_1_Clac_Clac/pkg/proto/appeal/v1";

enum Category {
  CATEGORY_UNSPECIFIED = 0;
  CATEGORY_BUG = 1;
  CATEGORY_PROPOSAL = 2;
  CATEGORY_COMPLAINT = 3;
}

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_OPEN = 1;
  STATUS_IN_WORK = 2;
  STATUS_CLOSE = 3;
}

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_USER = 1;
  ROLE_SUPPORT = 2;
  ROLE_ADMIN = 3;
}

message AppealInfo {
  int64 appeal_id = 1;
  string appeal_link = 2;
  string email = 3;
  string display_name = 4;
  Status status = 5;
  Category category = 6;
  string description = 7;
  string attachment_url = 8;
  google.protobuf.Timestamp created_at = 9;
}

// CreateAppeal
message CreateAppealRequest {
  string user_link = 1;
  string email = 2;
  Category category = 3;
  string description = 4;
  string display_name = 5;
}

message CreateAppealResponse {
  string appeal_link = 1;
}

// GetAppeals
message GetAppealsRequest {
  string user_link = 1;
}

message GetAppealsResponse {
  Role role = 1;
  repeated AppealInfo appeals_info = 2;
}

// UploadAttachment
message UploadAttachmentRequest {
  string user_link = 1;
  string appeal_link = 2;
  string filename = 3;
  bytes image = 4;
}

message UploadAttachmentResponse {
  string attachment_url = 1;
}

// DeleteAppeal
message DeleteAppealRequest {
  string user_link = 1;
  string appeal_link = 2;
}

message DeleteAppealResponse {}

// GetStats
message GetStatsRequest {
  string user_link = 1;
}

message GetStatsResponse {
  int64 open_appeals = 1;
  int64 in_work_appeals = 2;
  int64 close_appeals = 3;
}

// ChangeAppealStatus
message ChangeAppealStatusRequest {
  string user_link = 1;
  string appeal_link = 2;
  string appeal_status = 3;
  Status new_status = 4;
}

message ChangeAppealStatusResponse {}

service AppealService {
  rpc CreateAppeal(CreateAppealRequest) returns (CreateAppealResponse);
  rpc GetAppeals(GetAppealsRequest) returns (GetAppealsResponse);
  rpc UploadAttachment(UploadAttachmentRequest) returns (UploadAttachmentResponse);
  rpc DeleteAppeal(DeleteAppealRequest) returns (DeleteAppealResponse);
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
  rpc ChangeAppealStatus(ChangeAppealStatusRequest) returns (ChangeAppealStatusResponse);
}
