syntax = "proto3";

package proto.card.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/go-park-mail-ru/2026_1_Clac_Clac/pkg/proto/card/v1";

message CardInfo {
  string link = 1;
  optional string executor_name = 2;
  string title = 3;
  string description = 4;
  optional google.protobuf.Timestamp deadline = 5;
}

message CommentInfo {
  string comment_link = 1;
  optional string parent_link = 2;
  string author_link = 3;
  string text = 4;
}

// GetCard
message GetCardRequest {
  string user_link = 1;
  string card_link = 2;
}

message GetCardResponse {
  CardInfo card_info = 1;
}

// DeleteCard
message DeleteCardRequest {
  string user_link = 1;
  string card_link = 2;
}

message DeleteCardResponse {}

// UpdateCard
message UpdateCardRequest {
  string user_link = 1;
  string card_link = 2;
  optional string executor_link = 3;
  string title = 4;
  string description = 5;
  optional google.protobuf.Timestamp deadline = 6;
}

message UpdateCardResponse {}

// ReorderCard
message ReorderCardsRequest {
  string user_link = 1;
  string section_link = 2;
  string card_link = 3;
  int64 position = 4;
}

message ReorderCardsResponse {}

// CreateCard
message CreateCardRequest {
  string user_link = 1;
  string title = 2;
  string description = 3;
  optional string executor_link = 4;
  optional google.protobuf.Timestamp deadline = 5;
  string section_link = 6;
}

message CreateCardResponse {
  string card_link = 1;
  string section_link = 2;
  int64 position = 3;
}

// GetComments
message GetCommentsRequest {
  string user_link = 1;
  string card_link = 2;
}

message GetCommentsResponse {
  repeated CommentInfo comments_info = 1;
}

// CreateComment
message CreateCommentRequest {
  string user_link = 1;
  string card_link = 2;
  optional string parent_link = 3;
  string text = 4;
}

message CreateCommentResponse {
  string comment_link = 1;
}

// DeleteComment
message DeleteCommentRequest {
  string comment_link = 1;
  string user_link = 2;
}

message DeleteCommentResponse {}

// UpdateComment
message UpdateCommentRequest {
  string comment_link = 1;
  string user_link = 2;
  string text = 3;
}

message UpdateCommentResponse {}

message CreateSubtaskRequest {
  string card_link = 1;
  string description =2;
}

message CreateSubtaskResponse {
  string subtask_link = 1;
}

message UpdateSubtaskRequest {
  string card_link = 1;
  string subtask_link = 2;
  bool ready = 3;
  string description = 4;
}

message UpdateSubtaskResponse {}

message DeleteSubtaskRequest {
  
}

message DeleteSubtaskResponse {}

service CardService {
  rpc GetCard(GetCardRequest) returns (GetCardResponse);
  rpc DeleteCard(DeleteCardRequest) returns (DeleteCardResponse);
  rpc UpdateCard(UpdateCardRequest) returns (UpdateCardResponse);
  rpc ReorderCards(ReorderCardsRequest) returns (ReorderCardsResponse);
  rpc CreateCard(CreateCardRequest) returns (CreateCardResponse);
  rpc GetComments(GetCommentsRequest) returns (GetCommentsResponse);
  rpc CreateComment(CreateCommentRequest) returns (CreateCommentResponse);
  rpc DeleteComment(DeleteCommentRequest) returns (DeleteCommentResponse);
  rpc UpdateComment(UpdateCommentRequest) returns (UpdateCommentResponse);
  rpc CreateSubtask(CreateSubtaskRequest) returns (CreateSubtaskResponse);
  rpc UpdateSubtask(UpdateSubtaskRequest) returns (UpdateSubtaskResponse);
  rpc DeleteSubtask(DeleteSubtaskRequest) returns (DeleteSubtaskResponse);
}
