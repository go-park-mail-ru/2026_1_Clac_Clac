syntax = "proto3";

package proto.card.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/go-park-mail-ru/2026_1_Clac_Clac/pkg/proto/card/v1";

message CardInfo {
  string link = 1;
  optional string executor_link = 2;
  string title = 3;
  string description = 4;
  optional google.protobuf.Timestamp deadline = 5;
  optional google.protobuf.Timestamp start = 6;
  repeated SubtaskInfo subtasks = 7;
  int64 position = 8;
  repeated AttachmentInfo attachments = 9;
  bool status = 10;
}

message SubtaskInfo {
  string subtask_link = 1;
  string description = 2;
  bool is_done = 3;
  int64 position = 4;
}

message AttachmentInfo {
  string attachment_link = 1;
  string path = 2;
  string name = 3;
  int64 position = 4;
}

message CommentInfo {
  string comment_link = 1;
  optional string parent_link = 2;
  string author_link = 3;
  string text = 4;
  google.protobuf.Timestamp created_at = 5;
}

// GetCard
message GetCardRequest {
  string user_link = 1;
  string card_link = 2;
}

message GetCardResponse {
  CardInfo card_info = 1;
}

// DeleteCard
message DeleteCardRequest {
  string user_link = 1;
  string card_link = 2;
}

message DeleteCardResponse {}

// UpdateCard
message UpdateCardRequest {
  string user_link = 1;
  string card_link = 2;
  optional string executor_link = 3;
  string title = 4;
  string description = 5;
  optional google.protobuf.Timestamp deadline = 6;
  optional google.protobuf.Timestamp start = 7;
}

message UpdateCardResponse {}

// ReorderCard
message ReorderCardsRequest {
  string user_link = 1;
  string section_link = 2;
  string card_link = 3;
  int64 position = 4;
}

message ReorderCardsResponse {}

// CreateCard
message CreateCardRequest {
  string user_link = 1;
  string title = 2;
  string description = 3;
  optional string executor_link = 4;
  optional google.protobuf.Timestamp deadline = 5;
  optional google.protobuf.Timestamp start = 6;
  string section_link = 7;
}

message CreateCardResponse {
  string card_link = 1;
  string section_link = 2;
  int64 position = 3;
}

// GetComments
message GetCommentsRequest {
  string user_link = 1;
  string card_link = 2;
}

message GetCommentsResponse {
  repeated CommentInfo comments_info = 1;
}

// CreateComment
message CreateCommentRequest {
  string user_link = 1;
  string card_link = 2;
  optional string parent_link = 3;
  string text = 4;
}

message CreateCommentResponse {
  string comment_link = 1;
}

// DeleteComment
message DeleteCommentRequest {
  string comment_link = 1;
  string user_link = 2;
}

message DeleteCommentResponse {}

// UpdateComment
message UpdateCommentRequest {
  string comment_link = 1;
  string user_link = 2;
  string text = 3;
}

message UpdateCommentResponse {}

message CreateSubtaskRequest {
  string user_link = 1;
  string card_link = 2;
  string description = 3;
}

message CreateSubtaskResponse {
  string subtask_link = 1;
  string description = 2;
  bool isDone = 3;
  int64 position = 4;
}

message UpdateSubtaskRequest {
  string user_link = 1;
  string subtask_link = 2;
  bool is_done = 3;
  string description = 4;
}

message UpdateSubtaskResponse {}

message DeleteSubtaskRequest {
  string user_link = 1;
  string subtask_link = 2;
}

message DeleteSubtaskResponse {}

message CreateAttachmentRequest {
  string task_link = 1;
  string user_link = 2;
  bytes data = 3;
  string name = 4;
}

message CreateAttachmentResponse {
  string attachment_link = 1;
  string path = 2;
  int64 position = 3;
  string name = 4;
}

message DeleteAttachmentRequest {
  string user_link = 1;
  string attachment_link = 2;
}

message DeleteAttachmentResponse {}

message UpdateStatusTaskRequest {
  string user_link = 1;
  string task_link = 2;
  bool status = 3;
}

message UpdateStatusTaskResponse {}

message UpdateTimeLineTaskRequest {
  string user_link = 1;
  string task_link = 2;
  google.protobuf.Timestamp deadline = 3;
  google.protobuf.Timestamp start = 4;
}

message UpdateTimeLineTaskResponse {}

service CardService {
  rpc GetCard(GetCardRequest) returns (GetCardResponse);
  rpc DeleteCard(DeleteCardRequest) returns (DeleteCardResponse);
  rpc UpdateCard(UpdateCardRequest) returns (UpdateCardResponse);
  rpc ReorderCards(ReorderCardsRequest) returns (ReorderCardsResponse);
  rpc CreateCard(CreateCardRequest) returns (CreateCardResponse);
  rpc GetComments(GetCommentsRequest) returns (GetCommentsResponse);
  rpc CreateComment(CreateCommentRequest) returns (CreateCommentResponse);
  rpc DeleteComment(DeleteCommentRequest) returns (DeleteCommentResponse);
  rpc UpdateComment(UpdateCommentRequest) returns (UpdateCommentResponse);
  rpc CreateSubtask(CreateSubtaskRequest) returns (CreateSubtaskResponse);
  rpc UpdateSubtask(UpdateSubtaskRequest) returns (UpdateSubtaskResponse);
  rpc DeleteSubtask(DeleteSubtaskRequest) returns (DeleteSubtaskResponse);
  rpc CreateAttachment(CreateAttachmentRequest) returns (CreateAttachmentResponse);
  rpc DeleteAttachment(DeleteAttachmentRequest) returns (DeleteAttachmentResponse);
  rpc UpdateStatusTask(UpdateStatusTaskRequest) returns (UpdateStatusTaskResponse);
  rpc UpdateTimeLineTask(UpdateTimeLineTaskRequest) returns (UpdateTimeLineTaskResponse);
}
