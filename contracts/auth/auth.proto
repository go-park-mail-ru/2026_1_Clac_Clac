syntax = "proto3";
package auth;
option go_package = "./pkg/auth;auth";

service AuthService {
    rpc RegisterUser(RegisterRequest) returns (UserResponse);
    rpc LogInUser(LogInRequest) returns (UserResponse);
    rpc LogOutUser(SessionRequest) returns (LogOutResponse);
    rpc CheckRecoveryCode(TokenRequest) returns (CheckRecoveryCodeResponse);
    rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);
    rpc LoginWithVK(VKLoginRequest) returns (LoginVKResponse);
    rpc GenerateCSRFToken(CSRFRequest) returns (CSRFResponse);
}

message LogOutResponse {}
message CheckRecoveryCodeResponse{}
message ResetPasswordResponse {}

message RegisterRequest {
    string email = 1;
    string password = 2;
    string repeat_password = 3;
    string display_name = 4;
}

message LogInRequest {
    string email = 1;
    string password = 2;
}
message UserResponse {
    string user_link = 1;
    string email = 2;
    string display_name = 3;
    string avatar = 4;
    string session_id = 5;
}

message VKLoginRequest {
    string code = 1;
}

message LoginVKResponse {
    string session_id = 1;
}
message SessionRequest {
    string session_id = 1;
}
message UserLinkRequest {
    string user_link = 1;
}
message UserLinkResponse {
    string user_link = 1;
}
message EmailRequest {
    string email = 1;
}
message TokenRequest {
    string token_id = 1;
}
message ResetPasswordRequest {
    string token_id = 1;
    string password = 2;
    string repeated_password = 3;
}
message CSRFRequest {
    string session_id = 1;
    int64 expire_time = 2;
}
message CSRFResponse {
    string token = 1;
}
message CheckCSRFRequest {
    string session_id = 1;
    string token = 2;
}
message CSRFExpireResponse {
    int64 expire_unix = 1;
}
