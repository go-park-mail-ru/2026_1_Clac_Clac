syntax = "proto3";

package mail;

option go_package = "./pkg/mail;mail";

// Сервис для отправки email-сообщений пользователям
service MailService {
    // Отправяет письмо на указанный электронный адрес
    rpc SendEmail (SendMailRequest) returns (SendMmailResponse);
}

message SendMailRequest {
    string to = 1;
    string subject = 2;
    string body = 3;
}

message SendMmailResponse {
  bool success = 1;
  string error = 2;
}
