syntax = "proto3";

package auth;

option go_package = "./pkg/auth;auth";

// Сервис отвечает ИСКЛЮЧИТЕЛЬНО за управление сессиями (Redis)
service AuthService {
    // Создает новую сессию по UserLink и возвращает SessionID
    rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);

    // Проверяет SessionID и возвращает UserLink (если сессия жива)
    rpc GetUserLink(GetUserLinkRequest) returns (GetUserLinkResponse);

    // Удаляет сессию при логауте
    rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);

    // Продлить время жизни сессии
    rpc ExtendSession(ExtendSessionRequest) returns (ExtendSessionResponse);

    rpc GenerateCSRFToken(CSRFTokenRequest) returns (CSRFTokenResponse);

    rpc CheckCSRFToken(CSRFCheckRequest) returns (CSRFCheckResponse);
}

message ExtendSessionRequest {
    string session_id = 1;
}

message ExtendSessionResponse {}

message CreateSessionRequest {
    string user_link = 1;
}

message CreateSessionResponse {
    string session_id = 1;
}

message GetUserLinkRequest {
    string session_id = 1;
}
message GetUserLinkResponse {
    string user_link = 1;
}

message DeleteSessionRequest {
    string session_id = 1;
}

message DeleteSessionResponse {}

message CSRFTokenRequest {
    string session_id = 1;
}

message CSRFTokenResponse {
    string token = 1;
}

message CSRFCheckRequest {
    string session_id = 1;
    string token = 2;
}

message CSRFCheckResponse {}
