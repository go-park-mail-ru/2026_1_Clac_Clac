  mod-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Check go mod consistency
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || \
          (echo "::error::go.mod/go.sum out of sync. Run 'go mod tidy' locally." && exit 1)

  tests:
    needs: mod-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - run: go mod download
      - name: tests
        run: |
          make -f Makefile.test cover
          make -f Makefile.test ci
