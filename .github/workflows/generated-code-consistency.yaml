name: Check Generated Code Consistency

on:
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install Go Dependencies
        run: |
          go install github.com/mailru/easyjson/easyjson@latest
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Generate Mocks
        run: go generate ./...

      - name: Generate Easyjson
        run: make easyjson

      - name: Generate Proto
        run: make proto

      - name: Check diff
        run: |
          git diff --exit-code || \
          (echo "::error::Generated files are out of sync. Run 'make proto', 'make easyjson' and 'go generate ./...' locally." && exit 1)
