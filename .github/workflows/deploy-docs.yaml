name: Deploy Docs

on:
  workflow_call:
    inputs:
      endpoint-url:
        description: "S3 Endpoint"
        required: true
        type: string
      aws-region:
        description: "S3 Region"
        required: true
        type: string
      bucket-name:
        description: "S3 Bucket name"
        required: true
        type: string
    secrets:
      S3_ACCESS_KEY:
        required: true
      S3_SECRET_KEY:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Build Docs
        run: make docs

      - name: Build Stoplight
        run: npx @stoplight/elements-cli bundle -i docs/swagger.json -o docs-dist/

      - name: Deploy to S3
        uses: ./.github/actions/s3-deploy
        with:
          aws-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.S3_SECRET_KEY }}
          aws-region: ${{ inputs.aws-region }}
          bucket-name: ${{ inputs.bucket-name }}
          endpoint-url: ${{ inputs.endpoint-url }}
          source-dir: "docs-dist"
