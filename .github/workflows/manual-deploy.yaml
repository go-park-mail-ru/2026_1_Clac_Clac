name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_to:
        description: 'Where to deploy?'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      DRY_RUN: false
      DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Tag
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run Deploy Script
        run: |
          chmod +x ./deploy.sh
          # При ручном запуске сравниваем с предыдущим коммитом, чтобы понять что собирать
          ./deploy.sh HEAD~1

      - name: Update ArgoCD Target Revision on Deploy Branch
        if: ${{ github.event.inputs.deploy_to == 'staging' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Клонируем только ветку deploy в отдельную папку
          git clone --branch deploy --single-branch https://x-token-auth:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} deploy-repo
          
          # Обновляем targetRevision в ветке deploy
          sed -i "s|targetRevision:.*|targetRevision: ${GITHUB_REF_NAME}|g" deploy-repo/infrastructure/argocd/nexus-staging.yaml
          
          cd deploy-repo
          git add infrastructure/argocd/nexus-staging.yaml
          if git diff --staged --quiet; then
            echo "No changes to staging config"
          else
            git commit -m "chore: redirect staging to ${GITHUB_REF_NAME} [skip ci]"
            git push origin deploy
          fi

      - name: Commit and Push Image Tags to Current Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/nexus/values.yaml
          if git diff --staged --quiet; then
            echo "No changes to image tags"
          else
            git commit -m "chore(manual): update image tags for ${GITHUB_REF_NAME} [skip ci]"
            git push origin HEAD:${{ github.ref }}
