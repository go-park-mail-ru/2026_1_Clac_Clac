name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_to:
        description: 'Where to deploy?'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      DRY_RUN: false
      DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Tag
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run Deploy Script
        run: |
          chmod +x ./deploy.sh
          # При ручном запуске сравниваем с предыдущим коммитом, чтобы понять что собирать
          ./deploy.sh HEAD~1

      - name: Update ArgoCD Target Revision
        if: ${{ github.event.inputs.deploy_to == 'staging' }}
        run: |
          sed -i "s|targetRevision:.*|targetRevision: ${GITHUB_REF_NAME}|g" infrastructure/argocd/nexus-staging.yaml
          echo "Redirected nexus-staging to branch ${GITHUB_REF_NAME}"

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/nexus/values.yaml
          git add infrastructure/argocd/nexus-staging.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(manual): deploy ${GITHUB_REF_NAME} to ${{ github.event.inputs.deploy_to }} [skip ci]"
            git push
          fi
