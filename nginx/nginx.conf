server {
    listen 80;
    server_name clac-clac.mooo.com www.clac-clac.mooo.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name clac-clac.mooo.com www.clac-clac.mooo.com;

    ssl_certificate /etc/letsencrypt/live/clac-clac.mooo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clac-clac.mooo.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' https://esm.sh;
        style-src 'self' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data:;
        connect-src 'self' https://esm.sh;
    " always;

    add_header X-Content-Type-Options 'nosniff' always;
    add_header X-Frame-Option 'DENY' always;
    add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains' always;
    add_header Referrer-Policy 'no-referrer-when-downgrade' always;

    location / {
        root /home/ubuntu/public;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        add_header Access-Control-Allow-Credentials 'true' always;
        add_header Access-Control-Allow-Origin 'https://clac-clac.mooo.com' always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-CSRF-Token' always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Allow-Origin 'https://clac-clac.mooo.com';
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-CSRF-Token';
            add_header Access-Control-Max-Age 864000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
