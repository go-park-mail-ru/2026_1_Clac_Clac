limit_req_zone $binary_remote_addr zone=global_api:10m rate=10r/s;

server {
    listen 80;
    server_name clac-clac.mooo.com www.clac-clac.mooo.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name clac-clac.mooo.com www.clac-clac.mooo.com;

    ssl_certificate /etc/letsencrypt/live/clac-clac.mooo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clac-clac.mooo.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://esm.sh 'unsafe-eval' 'sha256-hB0j7QlEePD9ggRRDWPcGYJWVzEYeDo+6Kq5M4QZLMA='; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://nexus-avatars-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-boards-prod.hb.ru-msk.vkcloud-storage.ru; connect-src 'self' https://esm.sh https://fonts.googleapis.com https://fonts.gstatic.com https://nexus-avatars-prod.hb.ru-msk.vkcloud-storage.ru https://nexus-boards-prod.hb.ru-msk.vkcloud-storage.ru;" always;

    add_header X-Content-Type-Options 'nosniff' always;
    add_header X-Frame-Options 'DENY' always;
    add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains' always;
    add_header Referrer-Policy 'no-referrer-when-downgrade' always;

    location / {
        root /home/ubuntu/public;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        limit_req zone=global_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/docs/ {
        limit_req zone=global_api burst=20 nodelay;
        limit_req_status 429;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self';" always;

        add_header X-Content-Type-Options 'nosniff' always;
        add_header X-Frame-Options 'DENY' always;
        add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains' always;
        add_header Referrer-Policy 'no-referrer-when-downgrade' always;

        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /monitor/ {
        add_header X-Content-Type-Options 'nosniff' always;
        add_header X-Frame-Options 'DENY' always;
        add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains' always;
        add_header Referrer-Policy 'no-referrer-when-downgrade' always;

        proxy_pass http://127.0.0.1:3000/;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
