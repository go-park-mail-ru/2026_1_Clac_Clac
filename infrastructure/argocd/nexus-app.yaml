apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/go-park-mail-ru/2026_1_Clac_Clac
    path: deployments/nexus
    targetRevision: feat/add-more-defenders-for-DB
  destination:
    server: https://kubernetes.default.svc
    namespace: nexus-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
