apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-infrastructure-configs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/go-park-mail-ru/2026_1_Clac_Clac.git
    targetRevision: main
    path: infrastructure/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
